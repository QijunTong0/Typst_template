name: Compile Typst with Regular and Bold Fonts

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create fonts directory
        run: mkdir -p .fonts

      - name: Cache Fonts
        id: cache-fonts
        uses: actions/cache@v4
        with:
          path: .fonts
          # ファイル構成が変わったので、キーを v1 から v2 に更新
          key: fonts-haranoaji-selective-v2

      - name: Download Harano Aji Fonts (Regular & Bold)
        if: steps.cache-fonts.outputs.cache-hit != 'true'
        run: |
          cd .fonts
          # 明朝 (Regular & Bold)
          curl -L -O https://github.com/trueroad/HaranoAjiFonts/raw/master/HaranoAjiMincho-Regular.otf
          curl -L -O https://github.com/trueroad/HaranoAjiFonts/raw/master/HaranoAjiMincho-Bold.otf
          
          # ゴシック (Regular & Bold)
          curl -L -O https://github.com/trueroad/HaranoAjiFonts/raw/master/HaranoAjiGothic-Regular.otf
          curl -L -O https://github.com/trueroad/HaranoAjiFonts/raw/master/HaranoAjiGothic-Bold.otf

      - name: Typst Compile via Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w /work \
            ghcr.io/typst/typst:latest \
            compile main.typ --font-path .fonts

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: main.pdf